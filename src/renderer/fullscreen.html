<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rax</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-blocking font load: trimmed to weights actually used (400-700)
         and swapped via the media="print" / onload trick so the first paint
         doesn't wait on the network. The system-font fallback in CSS handles
         the brief window before Poppins arrives. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" /></noscript>
  </head>
  <body style="margin:0; background:#0c0c0e; overflow:hidden;">
    <div id="root" style="width:100vw; height:100vh;"></div>
    <script type="module" src="./fullscreen/main.tsx"></script>
  </body>
</html>
